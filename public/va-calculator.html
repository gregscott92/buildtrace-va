<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>VA Rating Calculator</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:Arial,sans-serif; background:#041b4d; color:#fff; }
    .wrap { max-width:760px; margin:0 auto; padding:24px 18px 40px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:18px; }
    h1 { margin:0; font-size:28px; font-weight:800; }
    .btn { width:100%; border:none; border-radius:18px; padding:18px 16px; font-size:20px; font-weight:800; cursor:pointer; }
    .btn-blue { background:#2563eb; color:#fff; }
    .btn-red { background:#ef4444; color:#fff; width:auto; padding:12px 16px; font-size:16px; border-radius:14px; }
    .card { background:#0a2566; border-radius:18px; padding:18px; margin-top:18px; box-shadow:0 4px 14px rgba(0,0,0,0.18); }
    .label { display:block; font-weight:800; margin-bottom:8px; }
    .field { width:100%; margin-top:8px; margin-bottom:14px; padding:14px 16px; border:none; border-radius:14px; font-size:16px; background:#f2f4f8; color:#111827; }
    .result-row { font-size:18px; line-height:1.45; margin-bottom:10px; }
    .muted { color:#cbd5e1; }
    .hidden { display:none; }
    .pulse { animation: pulseGlow 1s ease-in-out 3; border:2px solid #22c55e; }
    @keyframes pulseGlow { 0%{box-shadow:0 0 0 rgba(34,197,94,0)} 50%{box-shadow:0 0 24px rgba(34,197,94,0.75)} 100%{box-shadow:0 0 0 rgba(34,197,94,0)}}
  </style>

<body>
  <div class="wrap">
    <div class="topbar">
      <h1>VA Rating Calculator</h1>
      <button class="btn-red" onclick="window.location.href='/dashboard'">Back</button>
    </div>

    <div class="card">
      <label class="label" for="vaRatings">All ratings (comma separated)</label>
      <input id="vaRatings" class="field" type="text" placeholder="50,30,10" />

      <label class="label" for="vaLeft">Left-side bilateral ratings (optional)</label>
      <input id="vaLeft" class="field" type="text" placeholder="10,20" />

      <label class="label" for="vaRight">Right-side bilateral ratings (optional)</label>
      <input id="vaRight" class="field" type="text" placeholder="10,20" />

      <label class="label"><input id="vaSpouse" type="checkbox" /> Spouse</label>
      <label class="label"><input id="vaSpouseAid" type="checkbox" /> Spouse gets Aid and Attendance</label>

      <label class="label" for="vaParents">Dependent parents</label>
      <select id="vaParents" class="field">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
      </select>

      <label class="label" for="vaChildU18">Children under 18</label>
      <input id="vaChildU18" class="field" type="number" min="0" value="0" />

      <label class="label" for="vaChildSchool">Children 18+ in qualifying school</label>
      <input id="vaChildSchool" class="field" type="number" min="0" value="0" />

      <button id="vaCalcBtn" class="btn btn-blue" type="button">Run VA Calculator</button>

      <div id="vaCalcResult" class="hidden card" style="margin-top:16px;"></div>
    </div>
  </div>

  <script>

function trackEvent(eventName, data = {}) {
  try {
    fetch("/track", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        event: eventName,
        data
      })
    });
  } catch (err) {
    console.log("track failed", err);
  }
}

    function getToken() {
      return localStorage.getItem("token") || "";
    }

    function parseRatingsInput(value) {
      return String(value || "")
        .split(",")
        .map(v => Number(String(v).trim()))
        .filter(v => !Number.isNaN(v) && v > 0);
    }

    async function runVACalc() {
  posthog.capture("va_calculator_run", {
    ratings: document.getElementById("vaRatings")?.value || "",
    left: document.getElementById("vaLeft")?.value || "",
    right: document.getElementById("vaRight")?.value || "",
    spouse: !!document.getElementById("vaSpouse")?.checked,
    spouse_aid: !!document.getElementById("vaSpouseAid")?.checked,
    parents: document.getElementById("vaParents")?.value || "",
    child_under_18: document.getElementById("vaChildUnder18")?.value || "",
    child_school: document.getElementById("vaChildSchool")?.value || ""
  });
      const ratings = parseRatingsInput(document.getElementById("vaRatings").value);
      const left = parseRatingsInput(document.getElementById("vaLeft").value);
      const right = parseRatingsInput(document.getElementById("vaRight").value);
      const spouse = document.getElementById("vaSpouse").checked;
      const spouse_aid = document.getElementById("vaSpouseAid").checked;
      const parents = Number(document.getElementById("vaParents").value || 0);
      const child_under_18 = Number(document.getElementById("vaChildU18").value || 0);
      const child_school = Number(document.getElementById("vaChildSchool").value || 0);
      const resultEl = document.getElementById("vaCalcResult");
      const btn = document.getElementById("vaCalcBtn");

      if (!ratings.length) {
        alert("Enter at least one rating");
        return;
      }

      const oldText = btn.innerText;
      btn.innerText = "Calculating...";
      btn.disabled = true;

      try {
        trackEvent("calculator_run", {
          page: "va_calculator",
          ratings: document.getElementById("vaRatings")?.value || "",
          left: document.getElementById("vaLeft")?.value || "",
          right: document.getElementById("vaRight")?.value || ""
        });
        const res = await fetch("/va/calc", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": getToken() ? "Bearer " + getToken() : ""
          },
          body: JSON.stringify({
            ratings, left, right, spouse, spouse_aid, parents, child_under_18, child_school
          })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          alert(data.error || "VA calculator failed");
          return;
        }

        resultEl.classList.remove("hidden");
        resultEl.classList.add("pulse");
        resultEl.innerHTML = `
          <div class="result-row"><b>Raw Combined:</b> ${data.raw}%</div>
          <div class="result-row"><b>Final VA Rating:</b> ${data.final}%</div>
          <div class="result-row"><b>Estimated Monthly:</b> $${data.monthly_estimate}</div>
          <div class="result-row"><b>Next tier:</b> ${data.next_needed ? "A new " + data.next_needed + "% rating" : "Already at max tier"}</div>
          <div class="muted">Standard VA compensation estimate only.

<div id="calcLeadBox" style="margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.12);">
  <div style="font-size:18px;font-weight:800;margin-bottom:8px;">
    Want to know if this claim actually gets approved?
  </div>

  <div style="font-size:14px;opacity:0.9;line-height:1.45;margin-bottom:10px;">
    Use the analyzer next. It will show:
    <ul style="margin:8px 0 0 18px;padding:0;line-height:1.5;">
      <li>what evidence you’re missing</li>
      <li>what could get the claim denied</li>
      <li>what to fix before you file</li>
    </ul>
  </div>

  <textarea
    

  <div style="margin:10px 0 14px 0;padding:10px 12px;background:#1e3a8a;border-radius:8px;font-size:13px;line-height:1.4;">
  Most claims don’t get approved because of how they’re written — not because of the condition.
</div>
</div>

<textarea id="calcClaimDetails"
    placeholder="Example: Lower back pain from service. Worse with standing, lifting, and flare-ups. Missed work. Current VA rating is 60% and I want to get higher."
    style="width:100%;padding:12px;margin-bottom:10px;border-radius:10px;border:none;min-height:110px;"
  ></textarea>

  <button
    id="calcToAnalyzerBtn"
    type="button"
    style="width:100%;padding:14px;background:#f3f4f6;color:#111827;border:none;border-radius:10px;font-weight:800;font-size:16px;margin-bottom:10px;cursor:pointer;"
  >
    Analyze My Claim
  </button>

  <button
    id="calcUpgradeBtn"
    type="button"
    onclick="window.location.href='https://buy.stripe.com/14A14pd8G5IC5pV1OL9EI01'"
    style="width:100%;padding:14px;background:#22c55e;color:#fff;border:none;border-radius:10px;font-weight:800;font-size:16px;cursor:pointer;"
  >
    Get Full Strategy (Exact Steps to Increase Rating) — $14.95
  </button>

  <div style="font-size:12px;opacity:0.8;margin-top:6px;text-align:center;">
    Shows what to file, what to say, and how to increase your rating step-by-step.
  </div>

  <div style="font-size:12px;opacity:0.78;line-height:1.4;margin-top:8px;text-align:center;">
    Calculator = your current combined rating.<br>
    Analyzer = why the VA would approve, deny, or underrate the specific claim.
  </div>

<!-- calculator_funnel_end -->

</div>
</div>
        `;
        resultEl.scrollIntoView({ behavior: "smooth", block: "start" });
        setTimeout(() => resultEl.classList.remove("pulse"), 3200);
      } catch (err) {
        alert(err.message || "VA calculator failed");
      } finally {
        btn.innerText = oldText;
        btn.disabled = false;
      }
    }

    document.getElementById("vaCalcBtn").addEventListener("click", runVACalc);
trackEvent("page_view", { page: "va_calculator" });
  </script>
</body>

<!-- calculator_funnel_script_start -->
<script>
(function () {
  if (window.__calculatorFunnelBound) return;
  window.__calculatorFunnelBound = true;

  function getText(selector) {
    const el = document.querySelector(selector);
    return el ? (el.value || el.textContent || "").trim() : "";
  }

  function findMetric(label) {
    const text = document.body ? document.body.innerText : "";
    const re = new RegExp(label + String.raw`\s*:\s*([^\n]+)`, "i");
    const match = text.match(re);
    return match ? match[1].trim() : "";
  }

  function buildClaimContext() {
    const detailsBox = document.getElementById("calcClaimDetails");

    const userText =
      (detailsBox && detailsBox.value.trim()) ||
      "";

    const rawCombined = findMetric("Raw Combined");
    const finalRating = findMetric("Final VA Rating");
    const estimatedMonthly = findMetric("Estimated Monthly");
    const nextTier = findMetric("Next tier");

    let parts = [];

    if (userText) {
      parts.push(userText);
    }

    let calcSummary = [];
    if (rawCombined) calcSummary.push("Raw Combined: " + rawCombined);
    if (finalRating) calcSummary.push("Final VA Rating: " + finalRating);
    if (estimatedMonthly) calcSummary.push("Estimated Monthly: " + estimatedMonthly);
    if (nextTier) calcSummary.push("Next tier: " + nextTier);

    if (calcSummary.length) {
      parts.push("Current calculator result:\n" + calcSummary.join("\n"));
    }

    return parts.join("\n\n").trim();
  }

  function bind() {
    const btn = document.getElementById("calcToAnalyzerBtn");
    if (!btn) return;

    btn.addEventListener("click", function () {
      const context = buildClaimContext();

      if (!context) {
        alert("Add a little detail first so the analyzer has something to review.");
        return;
      }

      try {
        localStorage.setItem("va_claim_context", context);
      } catch (e) {
        console.error("localStorage save failed", e);
      }

      try {
        if (typeof trackEvent === "function") {
          trackEvent("calc_to_analyzer_clicked", {
            source: "va_calculator",
            has_context: true
          });
        }
      } catch (e) {
        console.error("track calc_to_analyzer_clicked failed", e);
      }

      window.location.href = "/dashboard?autorun=1&from=calculator";
    });
  }

  function bindUpgrade() {
    const upgradeBtn = document.getElementById("calcUpgradeBtn");
    if (!upgradeBtn) return;

    upgradeBtn.addEventListener("click", function () {
      try {
        if (typeof trackEvent === "function") {
          trackEvent("calc_upgrade_clicked", {
            source: "va_calculator"
          });
        }
      } catch (e) {
        console.error("track calc_upgrade_clicked failed", e);
      }
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", function () {
      bind();
      bindUpgrade();
    });
  } else {
    bind();
    bindUpgrade();
  }
})();
</script>
<!-- calculator_funnel_script_end -->

</html>
