<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saved VA Claims</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:Arial,sans-serif; background:#041b4d; color:#fff; }
    .wrap { max-width:760px; margin:0 auto; padding:24px 18px 40px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:18px; }
    h1 { margin:0; font-size:28px; font-weight:800; }
    .btn-red { border:none; border-radius:14px; padding:12px 16px; font-size:16px; font-weight:800; cursor:pointer; background:#ef4444; color:#fff; }
    .card { background:#0a2566; border-radius:18px; padding:18px; margin-top:18px; box-shadow:0 4px 14px rgba(0,0,0,0.18); }
    .claim { background:#082059; border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:14px; margin-bottom:12px; }
    .meta { color:#cbd5e1; font-size:14px; margin-top:8px; }
    .pulse { animation: pulseGlow 1s ease-in-out 3; border:2px solid #22c55e; }
    @keyframes pulseGlow { 0%{box-shadow:0 0 0 rgba(34,197,94,0)} 50%{box-shadow:0 0 24px rgba(34,197,94,0.75)} 100%{box-shadow:0 0 0 rgba(34,197,94,0)}}
  </style>
<script>

posthog.init('phc_nSRmZ7SWGPUv6pZUp2iw9oZ4rCVmp7nArwDtHz2t2rpC', {
  api_host: 'https://us.i.posthog.com',
  autocapture: true,
  capture_pageview: true,
  disable_session_recording: false
});

posthog.capture("saved_claims_view");

</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>Saved VA Claims</h1>
      <button class="btn-red" onclick="window.location.href='/dashboard'">Back</button>
    </div>

    <div id="claimsCard" class="card"></div>
  </div>

  <script>

function trackEvent(eventName, data = {}) {
  try {
    fetch("/track", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        event: eventName,
        data
      })
    });
  } catch (err) {
    console.log("track failed", err);
  }
}


    function getToken() {
      return (
        localStorage.getItem("token") ||
        localStorage.getItem("token") ||
        localStorage.getItem("token") ||
        ""
      );
    }

    trackEvent("page_view", { page: "saved_claims" });

async function loadClaimsPage() {
      const token = getToken();
      if (!token) {
        document.getElementById("claimsCard").innerHTML = "<div>Save a claim from the analyzer and it will show up here.</div>";
        return;
      }

      const res = await fetch("/claims", {
        headers: {
          "Authorization": "Bearer " + token
        }
      });

      const data = await res.json();
      const container = document.getElementById("claimsCard");

      if (!res.ok || !data.success) {
        container.innerHTML = "<div>Failed to load saved claims.</div>";
        return;
      }

      if (!data.claims || !data.claims.length) {
        container.innerHTML = "<div>No saved claims yet.</div>";
        return;
      }

      container.classList.add("pulse");
      container.innerHTML = `
        <div style="font-size:18px;font-weight:800;margin-bottom:14px;">Saved VA Claims</div>
        ${data.claims.map(c => `
          <div class="claim">
            <div><b>Condition:</b> ${c.detected_condition || "N/A"}</div>
            <div><b>Rating:</b> ${c.estimated_rating ?? "N/A"}%</div>
            <div><b>Confidence:</b> ${c.confidence_label || "N/A"}</div>
            <div class="meta">${c.created_at ? new Date(c.created_at).toLocaleString() : ""}</div>
          </div>
        `).join("")}
      `;
      container.scrollIntoView({ behavior: "smooth", block: "start" });
      setTimeout(() => container.classList.remove("pulse"), 3200);
    }

    loadClaimsPage();
  </script>
</body>
</html>
