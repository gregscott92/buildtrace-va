<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VA Claim Analyzer</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #041b4d;
      color: #ffffff;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 18px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
    }

    .logout-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      background: #ef4444;
      color: white;
      width: auto;
    }

    .card {
      background: #0a2566;
      border-radius: 18px;
      padding: 18px;
      margin-top: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    }

    textarea {
      width: 100%;
      min-height: 180px;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 18px;
      line-height: 1.4;
      resize: vertical;
      background: #f2f4f8;
      color: #111827;
    }

    .actions {
      display: grid;
      gap: 14px;
      margin-top: 16px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 20px 18px;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-analyze {
      background: #18a84a;
      color: #ffffff;
    }

    .btn-upload {
      background: #2563eb;
      color: #ffffff;
    }

    .btn-saved {
      background: #ebedf0;
      color: #111111;
    }

    .btn-clear {
      background: #475569;
      color: #ffffff;
    }

    .btn-analyze:disabled,
    .btn-upload:disabled,
    .btn-saved:disabled,
    .btn-clear:disabled {
      opacity: 0.7;
      cursor: default;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 800;
    }

    .result-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .result-row {
      font-size: 18px;
      line-height: 1.4;
    }

    .label {
      font-weight: 800;
    }

    .summary {
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 17px;
    }

    .claims-list {
      display: grid;
      gap: 12px;
    }

    .claim-item {
      background: #082059;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px;
    }

    .claim-meta {
      color: #cbd5e1;
      font-size: 14px;
      margin-top: 8px;
    }

    .muted {
      color: #cbd5e1;
    }

    .hidden {
      display: none;
    }

    .error {
      background: #7f1d1d;
      color: #fee2e2;
      border-radius: 14px;
      padding: 12px 14px;
      margin-top: 14px;
      line-height: 1.4;
    }

    .file-note {
      margin-top: 10px;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.5;
    }

    .pages-list {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }

    .page-chip {
      background: #082059;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 12px;
      color: #e2e8f0;
      font-size: 14px;
      word-break: break-word;
    }

    @media (max-width: 600px) {
      .wrap {
        padding: 18px 14px 30px;
      }

      h1 {
        font-size: 24px;
      }

      textarea {
        min-height: 160px;
        font-size: 17px;
      }

      button {
        font-size: 18px;
        padding: 18px 16px;
      }

      .logout-btn {
        font-size: 14px;
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>VA Claim Analyzer</h1>
      <button id="logoutBtn" class="logout-btn" type="button">Log Out</button>
    </div>

    <div class="card">
      <textarea
        id="context"
        placeholder="Describe your condition, symptoms, service connection, treatment history, flare-ups, range-of-motion findings, and work or daily impact..."
      ></textarea>

      <input id="imageInput" type="file" accept="image/*" multiple class="hidden" />

      <div class="actions">
        <button id="uploadBtn" class="btn-upload" type="button">Upload Image Pages</button>
        <button id="clearImagesBtn" class="btn-clear" type="button">Clear Uploaded Pages</button>
        <button id="analyzeBtn" class="btn-analyze" type="button">Analyze Claim</button>
        <button id="loadBtn" class="btn-saved" type="button">View Saved Claims</button>
      </div>

      <div id="fileNote" class="file-note hidden"></div>
      <div id="pagesList" class="pages-list hidden"></div>
      <div id="errorBox" class="error hidden"></div>
    </div>

    <div id="resultCard" class="card hidden">
      <div class="section-title">Result</div>
      <div class="result-grid">
        <div class="result-row"><span class="label">Condition:</span> <span id="resultCondition">N/A</span></div>
        <div class="result-row"><span class="label">Estimated Rating:</span> <span id="resultRating">N/A</span></div>
        <div class="result-row"><span class="label">Confidence:</span> <span id="resultConfidence">N/A</span></div>
      </div>
      <div id="resultSummary" class="summary"></div>
    </div>

    <div id="claimsCard" class="card hidden">
      <div class="section-title">Saved VA Claims</div>
      <div id="claimsList" class="claims-list"></div>
    </div>
  </div>

  <script>
    let selectedImages = [];

    function getToken() {
      return (
        localStorage.getItem("token") ||
        localStorage.getItem("authToken") ||
        localStorage.getItem("accessToken") ||
        localStorage.getItem("jwt") ||
        ""
      );
    }

    function showError(message) {
      const box = document.getElementById("errorBox");
      if (!message) {
        box.classList.add("hidden");
        box.textContent = "";
        return;
      }
      box.textContent = message;
      box.classList.remove("hidden");
    }

    function setButtonState(id, text, disabled) {
      const btn = document.getElementById(id);
      btn.textContent = text;
      btn.disabled = disabled;
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || "");
          const base64 = result.includes(",") ? result.split(",")[1] : result;
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function renderSelectedPages() {
      const note = document.getElementById("fileNote");
      const list = document.getElementById("pagesList");

      if (!selectedImages.length) {
        note.classList.add("hidden");
        note.textContent = "";
        list.classList.add("hidden");
        list.innerHTML = "";
        return;
      }

      note.textContent = `${selectedImages.length} page(s) attached`;
      note.classList.remove("hidden");

      list.innerHTML = selectedImages.map((img, index) => `
        <div class="page-chip">Page ${index + 1}: ${img.name}</div>
      `).join("");
      list.classList.remove("hidden");
    }

    async function handleImageSelect(event) {
      showError("");

      const files = Array.from(event.target.files || []);
      if (!files.length) return;

      try {
        const converted = [];
        for (const file of files) {
          const base64 = await fileToBase64(file);
          converted.push({
            name: file.name || "image",
            base64
          });
        }

        selectedImages = selectedImages.concat(converted);
        renderSelectedPages();
        event.target.value = "";
      } catch (err) {
        showError("Could not read one or more images.");
      }
    }

    function clearImages() {
      selectedImages = [];
      document.getElementById("imageInput").value = "";
      renderSelectedPages();
      showError("");
    }

    async function analyze() {
      showError("");

      const text = document.getElementById("context").value.trim();

      if (!text && selectedImages.length === 0) {
        showError("Enter claim details or upload image pages first.");
        return;
      }

      setButtonState("analyzeBtn", "Analyzing...", true);

      try {
        const res = await fetch("/va/analyze-base64", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + getToken()
          },
          body: JSON.stringify({
            issue: "",
            serviceContext: text,
            imageBase64: "",
            imageBase64List: selectedImages.map((x) => x.base64)
          })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          throw new Error(data.error || "Analyze failed");
        }

        document.getElementById("resultCondition").textContent =
          data.structured?.condition || "N/A";

        document.getElementById("resultRating").textContent =
          data.structured?.estimatedRating !== null &&
          data.structured?.estimatedRating !== undefined
            ? data.structured.estimatedRating + "%"
            : "N/A";

        document.getElementById("resultConfidence").textContent =
          data.structured?.confidence || "N/A";

        document.getElementById("resultSummary").textContent =
          data.summary || "";

        document.getElementById("resultCard").classList.remove("hidden");
      } catch (err) {
        showError(err.message || "Analyze failed.");
      } finally {
        setButtonState("analyzeBtn", "Analyze Claim", false);
      }
    }

    async function loadClaims() {
      showError("");
      setButtonState("loadBtn", "Loading...", true);

      try {
        const res = await fetch("/claims", {
          headers: {
            Authorization: "Bearer " + getToken()
          }
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          throw new Error(data.error || "Failed to load claims");
        }

        const claims = Array.isArray(data.claims) ? data.claims : [];
        const list = document.getElementById("claimsList");

        if (!claims.length) {
          list.innerHTML = `<div class="muted">No saved claims yet.</div>`;
        } else {
          list.innerHTML = claims.map(c => {
            const created = c.created_at
              ? new Date(c.created_at).toLocaleString()
              : "Unknown date";

            const rating =
              c.estimated_rating !== null && c.estimated_rating !== undefined
                ? c.estimated_rating + "%"
                : "N/A";

            return `
              <div class="claim-item">
                <div class="result-row"><span class="label">Condition:</span> ${c.detected_condition || "N/A"}</div>
                <div class="result-row"><span class="label">Rating:</span> ${rating}</div>
                <div class="result-row"><span class="label">Confidence:</span> ${c.confidence_label || "N/A"}</div>
                <div class="claim-meta">${created}</div>
              </div>
            `;
          }).join("");
        }

        document.getElementById("claimsCard").classList.remove("hidden");
      } catch (err) {
        showError(err.message || "Failed to load claims.");
      } finally {
        setButtonState("loadBtn", "View Saved Claims", false);
      }
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("authToken");
      localStorage.removeItem("accessToken");
      localStorage.removeItem("jwt");
      window.location.href = "/login";
    }

    document.getElementById("uploadBtn").onclick = function () {
      document.getElementById("imageInput").click();
    };

    document.getElementById("clearImagesBtn").onclick = clearImages;
    document.getElementById("imageInput").addEventListener("change", handleImageSelect);
    document.getElementById("analyzeBtn").onclick = analyze;
    document.getElementById("loadBtn").onclick = loadClaims;
    document.getElementById("logoutBtn").onclick = logout;
  </script>
</body>
</html>
