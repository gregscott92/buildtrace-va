<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VA Claim Analyzer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #041b4d;
      color: #ffffff;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      border-radius: 14px;
      padding: 12px;
      font-size: 16px;
      border: none;
    }

    button {
      width: 100%;
      padding: 18px;
      border-radius: 14px;
      border: none;
      font-size: 18px;
      font-weight: bold;
      margin-top: 12px;
      cursor: pointer;
    }

    .green {
      background: #1ca44c;
      color: white;
    }

    .gray {
      background: #e5e5ea;
      color: black;
    }

    .card {
      background: #0a2566;
      padding: 16px;
      border-radius: 16px;
      margin-top: 16px;
    }

    .hidden {
      display: none;
    }

    .claim {
      background: #082059;
      padding: 12px;
      border-radius: 12px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <textarea id="context" placeholder="Describe your condition, symptoms, service connection..."></textarea>

    <button id="analyzeBtn" class="green">Analyze Claim</button>

    <div id="resultCard" class="card hidden"></div>

    <button id="loadBtn" class="gray">View Saved Claims</button>

    <div id="claimsCard" class="card hidden"></div>

  </div>

  <script>
    function getToken() {
      return (
        localStorage.getItem("token") ||
        localStorage.getItem("accessToken") ||
        ""
      );
    }

    async function analyze() {
      const text = document.getElementById("context").value.trim();

      if (!text) {
        alert("Enter something");
        return;
      }

      const res = await fetch("/va/analyze-base64", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + getToken()
        },
        body: JSON.stringify({
          issue: "",
          serviceContext: text,
          imageBase64: ""
        })
      });

      const data = await res.json();

      if (!data.success) {
        alert(data.error || "Failed");
        return;
      }

      document.getElementById("resultCard").classList.remove("hidden");

      document.getElementById("resultCard").innerHTML = `
        <b>Condition:</b> ${data.structured.condition || "N/A"}<br>
        <b>Rating:</b> ${data.structured.estimatedRating ?? "N/A"}<br>
        <b>Confidence:</b> ${data.structured.confidence || "N/A"}<br><br>
        ${data.summary.replace(/\n/g, "<br>")}
      `;
    }

    async function loadClaims() {
      const res = await fetch("/claims", {
        headers: {
          Authorization: "Bearer " + getToken()
        }
      });

      const data = await res.json();

      if (!data.success) {
        alert("Failed to load claims");
        return;
      }

      const container = document.getElementById("claimsCard");
      container.classList.remove("hidden");

      if (!data.claims.length) {
        container.innerHTML = "No saved claims.";
        return;
      }

      container.innerHTML = data.claims.map(c => `
        <div class="claim">
          <b>${c.detected_condition || "N/A"}</b><br>
          Rating: ${c.estimated_rating ?? "N/A"}<br>
          Confidence: ${c.confidence_label || "N/A"}
        </div>
      `).join("");
    }

    document.getElementById("analyzeBtn").onclick = analyze;
    document.getElementById("loadBtn").onclick = loadClaims;
  </script>

</body>
</html>
