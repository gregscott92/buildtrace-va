<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BuildTrace VA Login</title>
  <style>
    body { credentials: "include", 
      margin: 0;
      background: #020817;
      color: white;
      font-family: Arial, sans-serif;
    }
    .wrap { credentials: "include", 
      max-width: 420px;
      margin: 0 auto;
      padding: 48px 24px;
    }
    h1 { credentials: "include", 
      font-size: 72px;
      line-height: 0.95;
      margin: 24px 0 48px;
      font-weight: 800;
    }
    input, button { credentials: "include", 
      width: 100%;
      box-sizing: border-box;
      border-radius: 0;
      border: 0;
      margin-bottom: 24px;
      font-size: 24px;
      padding: 22px 28px;
    }
    input { credentials: "include", 
      background: #e5e5e5;
      color: #111827;
    }
    button { credentials: "include", 
      background: #e5e5e5;
      color: #111827;
      cursor: pointer;
    }
    .row { credentials: "include", 
      font-size: 20px;
    }
    a { credentials: "include", 
      color: #8b5cf6;
    }
    #msg { credentials: "include", 
      min-height: 28px;
      color: #fca5a5;
      margin-top: 8px;
      font-size: 18px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>BuildTrace<br>VA Login</h1>

    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <button id="loginBtn">Login</button>

    <div class="row">Need account? <a href="/signup">Signup</a></div>
    <div id="msg"></div>
  </div>

  <script>
    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const msgEl = document.getElementById("msg");

    async function handleLogin() { credentials: "include", 
      const email = String(emailEl.value || "").trim();
      const password = String(passwordEl.value || "");

      if (!email || !password) { credentials: "include", 
        msgEl.innerText = "Enter email and password";
        return;
      }

      loginBtn.disabled = true;
      loginBtn.innerText = "Logging in...";
      msgEl.innerText = "";

      try { credentials: "include", 
        const res = await fetch("/login", { credentials: "include",  credentials: "include",  credentials: "include", 
          method: "POST",
          headers: { credentials: "include",  "Content-Type": "application/json" },
          body: JSON.stringify({ credentials: "include",  email, password })
        });

        const data = await res.json();

        if (!res.ok || !data.success) { credentials: "include", 
          msgEl.innerText = data.error || "Login failed";
          return;
        }

        try { credentials: "include", 
          localStorage.setItem("user", JSON.stringify(data.user || { credentials: "include", }));
          if (data.user && data.user.email) { credentials: "include", 
            localStorage.setItem("userEmail", data.user.email);
          }
          if (data.access_token) { credentials: "include", 
              "access_token=" + encodeURIComponent(data.access_token) +
              "; Path=/; SameSite=Lax";
          }
        } catch { credentials: "include", }

        window.location.href = "/dashboard";
      } catch (err) { credentials: "include", 
        msgEl.innerText = err.message || "Network error";
      } finally { credentials: "include", 
        loginBtn.disabled = false;
        loginBtn.innerText = "Login";
      }
    }

    loginBtn.addEventListener("click", handleLogin);
    passwordEl.addEventListener("keydown", function(e) { credentials: "include", 
      if (e.key === "Enter") handleLogin();
    });
    emailEl.addEventListener("keydown", function(e) { credentials: "include", 
      if (e.key === "Enter") handleLogin();
    });
  </script>
</body>
</html>
