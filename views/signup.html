<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BuildTrace VA Signup</title>
  <style>
    body {
      margin: 0;
      background: #020817;
      color: white;
      font-family: Arial, sans-serif;
    }
    .wrap {
      max-width: 420px;
      margin: 0 auto;
      padding: 48px 24px;
    }
    h1 {
      font-size: 72px;
      line-height: 0.95;
      margin: 24px 0 48px;
      font-weight: 800;
    }
    input, button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 0;
      border: 0;
      margin-bottom: 24px;
      font-size: 24px;
      padding: 22px 28px;
    }
    input {
      background: #e5e5e5;
      color: #111827;
    }
    button {
      background: #e5e5e5;
      color: #111827;
      cursor: pointer;
    }
    .row {
      font-size: 20px;
    }
    a {
      color: #8b5cf6;
    }
    #msg {
      min-height: 28px;
      color: #fca5a5;
      margin-top: 8px;
      font-size: 18px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>BuildTrace<br>VA Signup</h1>

    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <button id="signupBtn">Create Account</button>

    <div class="row">Already have account? <a href="/login">Login</a></div>
    <div id="msg"></div>
  </div>

  <script>
    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const signupBtn = document.getElementById("signupBtn");
    const msgEl = document.getElementById("msg");

    async function handleSignup() {
      const email = String(emailEl.value || "").trim();
      const password = String(passwordEl.value || "");

      if (!email || !password) {
        msgEl.innerText = "Enter email and password";
        return;
      }

      signupBtn.disabled = true;
      signupBtn.innerText = "Creating...";
      msgEl.innerText = "";

      try {
        const res = await fetch("/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          msgEl.innerText = data.error || "Signup failed";
          return;
        }

        try {
          localStorage.setItem("user", JSON.stringify(data.user || {}));
          if (data.user && data.user.email) {
            localStorage.setItem("userEmail", data.user.email);
          }
          if (data.access_token) {
            document.cookie =
              "access_token=" + encodeURIComponent(data.access_token) +
              "; Path=/; SameSite=Lax";
          }
        } catch {}

        window.location.href = "/dashboard";
      } catch (err) {
        msgEl.innerText = err.message || "Network error";
      } finally {
        signupBtn.disabled = false;
        signupBtn.innerText = "Create Account";
      }
    }

    signupBtn.addEventListener("click", handleSignup);
    passwordEl.addEventListener("keydown", function(e) {
      if (e.key === "Enter") handleSignup();
    });
    emailEl.addEventListener("keydown", function(e) {
      if (e.key === "Enter") handleSignup();
    });
  </script>
</body>
</html>
