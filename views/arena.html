<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Arena</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #111;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .title {
      font-size: 32px;
      font-weight: 800;
      line-height: 1.1;
    }
    .sub {
      font-size: 15px;
      color: #555;
      margin-top: 6px;
    }
    .btn {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 10px;
      background: #111;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }
    .panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="title">Arena</div>
        <div class="sub">Post a scenario. See answers. Build public proof.</div>
      </div>
      <a class="btn" href="/dashboard">Back to Dashboard</a>
    </div>

    <div class="panel">
      <!-- ARENA SECTION -->
<div style="max-width:900px; margin:30px auto; padding:20px; border:1px solid #ddd; border-radius:12px; background:#fff;">
  <div style="font-size:28px; font-weight:700; margin-bottom:10px;">Arena</div>
  <div style="font-size:16px; margin-bottom:16px; opacity:0.8;">
    Post your situation, get an AI first response, and build a public knowledge layer.
  </div>

  <div style="margin-bottom:16px;">
    <input
      id="arena-title"
      placeholder="Post title"
      style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ccc; border-radius:8px; font-size:16px;"
    />
    <textarea
      id="arena-body"
      placeholder="Write your situation here"
      style="width:100%; min-height:120px; padding:12px; border:1px solid #ccc; border-radius:8px; font-size:16px;"
    ></textarea>
    <input type="hidden" id="arena-topic" value="va" />
<button
      onclick="createArenaPost()"
      style="margin-top:12px; padding:12px 18px; border:none; border-radius:8px; background:#111; color:#fff; font-size:16px; cursor:pointer;"
    >
      Post to Arena
    </button>
  </div>

  <div id="arena-status" style="margin-bottom:12px; font-size:14px; opacity:0.7;"></div>
  <div id="featured-post" style="margin-bottom:16px;"></div>
<div id="arena-posts"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const currentTopic = (params.get("topic") || "va").toLowerCase();

function escapeHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

async function loadArena() {
  const container = document.getElementById("arena-posts");
  if (!container) return;

  container.innerHTML = "Loading posts...";

  try {
    const res = await fetch(`/arena/posts?topic=${encodeURIComponent(currentTopic)}`);
    const data = await res.json();

    if (!data.success) {
      container.innerHTML = "Failed to load posts";
      return;
    }

    if (!data.posts || !data.posts.length) {
      container.innerHTML = "<div style=\"opacity:0.7;\">No posts yet.</div>";
      return;
    }

    container.innerHTML = data.posts.map(p => {
      const answers = Array.isArray(p.answers) ? p.answers : [];

      const answersHtml = answers.length
        ? answers.map(a => `
            <div style="margin-top:10px; padding:10px; border-radius:8px; background:#fff; border:1px solid #e8e8e8;">
              <div style="font-size:12px; font-weight:700; opacity:0.6; margin-bottom:4px;">
                ${a.used_ai ? "AI answer" : "Answer"}
              </div>
              <div style="font-size:14px; line-height:1.45;">${escapeHtml(a.reasoning || "")}</div>
            </div>
          `).join("")
        : '<div style="margin-top:10px; font-size:13px; opacity:0.6;">No answers yet.</div>';

      return `
          <div data-post-id="${data.post?.id || ""}" style="border:1px solid #ddd; padding:14px; margin:12px 0; border-radius:10px; background:#fafafa;">
          <div style="font-size:18px; font-weight:700; margin-bottom:6px;">${escapeHtml(p.title || "")}</div>
          <div style="font-size:15px; margin-bottom:8px;">${escapeHtml(p.body || "")}</div>
          <div style="font-size:12px; opacity:0.6;">
            ${p.created_at ? new Date(p.created_at).toLocaleString() : ""}
          </div>
          ${answersHtml}
        </div>
      `;
    }).join("");

setTimeout(() => {
  data.posts.forEach(p => loadComments(p.id));
}, 50);
injectCommentsUI();
  } catch (err) {
    container.innerHTML = "Failed to load posts";
  }
}


async function loadFeaturedPost() {
  const featuredEl = document.getElementById("featured-post");
  if (!featuredEl) return;

  try {
    const res = await fetch("/arena/featured");
    const data = await res.json();

    if (!data.success || !data.post) {
      featuredEl.innerHTML = "";
      return;
    }

    const p = data.post;
    featuredEl.innerHTML = `
      <div style="border:1px solid #ddd;padding:14px;border-radius:10px;background:#fafafa;">
        <div style="font-size:12px;opacity:0.6;margin-bottom:6px;">Most engaged recent post</div>
        <div style="font-size:12px;display:inline-block;background:#111;color:#fff;padding:4px 8px;border-radius:999px;margin-bottom:8px;">${p.topic || "va"}</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:6px;">${escapeHtml(p.title || "")}</div>
        <div style="font-size:14px;margin-bottom:8px;">${escapeHtml(p.body || "")}</div>
        <div style="font-size:12px;opacity:0.7;">Engagement: ${p.engagement_score || 0}</div>
      </div>
    `;
  } catch (_err) {
    featuredEl.innerHTML = "";
  }
}

async function createArenaPost() {
  const titleEl = document.getElementById("arena-title");
  const bodyEl = document.getElementById("arena-body");
  const statusEl = document.getElementById("arena-status");
  const postsEl = document.getElementById("arena-posts");
const topicEl = document.getElementById("arena-topic");
const params = new URLSearchParams(window.location.search);
const currentTopic = (params.get("topic") || "va").toLowerCase();
if (topicEl) topicEl.value = currentTopic;

  const title = titleEl ? titleEl.value.trim() : "";
const topic = topicEl ? topicEl.value.trim() : "va";
  const body = bodyEl ? bodyEl.value.trim() : "";

  if (!title) {
    if (statusEl) statusEl.textContent = "Title is required.";
    return;
  }

  if (statusEl) statusEl.textContent = "Posting...";

  try {
    const res = await fetch("/arena/posts", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, body, topic })
    });

    const data = await res.json();

    if (!res.ok || !data.success) {
      if (statusEl) statusEl.textContent = (data && data.error) ? data.error : "Failed to post.";
      return;
    }

    const newPostHtml = `
      <div data-post-id="${data.post?.id || ""}" style="border:1px solid #ddd; padding:14px; margin:12px 0; border-radius:10px; background:#fafafa;">
        <div style="font-size:18px; font-weight:700; margin-bottom:6px;">${escapeHtml(data.post?.title || title)}</div>
        <div style="font-size:15px; margin-bottom:8px;">${escapeHtml(data.post?.body || body)}</div>
        <div style="font-size:12px; opacity:0.6;">
          ${data.post?.created_at ? new Date(data.post.created_at).toLocaleString() : ""}
        </div>
        ${
          data.ai_answer
            ? `<div style="margin-top:10px; padding:10px; border-radius:8px; background:#fff; border:1px solid #e8e8e8;">
                 <div style="font-size:12px; font-weight:700; opacity:0.6; margin-bottom:4px;">AI answer</div>
                 <div style="font-size:14px; line-height:1.45; white-space:pre-wrap;">${escapeHtml(data.ai_answer.reasoning || "")}</div>
               </div>`
            : '<div style="margin-top:10px; font-size:13px; opacity:0.6;">No answers yet.</div>'
        }
      </div>
    `;

    if (postsEl) {
      const noPosts = postsEl.innerHTML.includes("No posts yet.");
      postsEl.innerHTML = noPosts ? newPostHtml : newPostHtml + postsEl.innerHTML;
    }

    if (titleEl) titleEl.value = "";
    if (bodyEl) bodyEl.value = "";

    if (statusEl) {
      statusEl.textContent = data.ai_answer
        ? "Posted. AI answer added."
        : "Posted.";
    }

    setTimeout(() => {
      loadArena();
    }, 400);
  } catch (err) {
    if (statusEl) statusEl.textContent = "Failed to post: " + (err.message || "unknown error");
  }
}

loadArena();

async function loadComments(postId) {
  const res = await fetch(`/arena/comments/${postId}`);
  const data = await res.json();
  const el = document.getElementById(`comments-${postId}`);
  if (!el) return;

  const comments = data.comments || [];

  el.innerHTML = comments.length
    ? comments.map(c => `
        <div style="padding:6px;border:1px solid #eee;margin-bottom:6px;border-radius:6px;">
          ${c.body}
        </div>
      `).join("")
    : "<div style='font-size:12px;color:#888;'>No comments</div>";
}

async function postComment(postId) {
  const input = document.getElementById(`comment-input-${postId}`);
  const body = input.value.trim();
  if (!body) return;

  await fetch("/arena/comments", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ post_id: postId, body })
  });

  input.value = "";
  loadComments(postId);
}



// ===== FORCE COMMENT UI AFTER RENDER =====
function injectCommentsUI() {
  const cards = document.querySelectorAll("[data-post-id]");

  cards.forEach(card => {
    const postId = card.getAttribute("data-post-id");
    if (!postId) return;

    // prevent duplicate
    if (card.querySelector(".comment-box")) return;

    const wrapper = document.createElement("div");
    wrapper.className = "comment-box";
    wrapper.style.marginTop = "12px";
    wrapper.innerHTML = `
      <div style="font-size:12px;color:#666;margin-bottom:6px;">Comments</div>
      <div id="comments-${postId}" style="margin-bottom:8px;"></div>
      <textarea id="comment-input-${postId}" placeholder="Add a comment..."
        style="width:100%;min-height:50px;padding:6px;border:1px solid #ccc;border-radius:6px;"></textarea>
      <button onclick="postComment('${postId}')"
        style="margin-top:6px;background:#111;color:#fff;padding:6px 10px;border:none;border-radius:6px;">
        Post
      </button>
    `;

    card.appendChild(wrapper);
    loadComments(postId);
  });
}

</script>

<!-- END ARENA SECTION -->
    </div>
  </div>
</body>
</html>
