<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VA Rating Calculator</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:Arial,sans-serif; background:#041b4d; color:#fff; }
    .wrap { max-width:760px; margin:0 auto; padding:24px 18px 40px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:18px; }
    h1 { margin:0; font-size:28px; font-weight:800; }
    .btn { width:100%; border:none; border-radius:18px; padding:18px 16px; font-size:20px; font-weight:800; cursor:pointer; }
    .btn-blue { background:#2563eb; color:#fff; }
    .btn-red { background:#ef4444; color:#fff; width:auto; padding:12px 16px; font-size:16px; border-radius:14px; }
    .card { background:#0a2566; border-radius:18px; padding:18px; margin-top:18px; box-shadow:0 4px 14px rgba(0,0,0,0.18); }
    .label { display:block; font-weight:800; margin-bottom:8px; }
    .field { width:100%; margin-top:8px; margin-bottom:14px; padding:14px 16px; border:none; border-radius:14px; font-size:16px; background:#f2f4f8; color:#111827; }
    .result-row { font-size:18px; line-height:1.45; margin-bottom:10px; }
    .muted { color:#cbd5e1; }
    .hidden { display:none; }
    .pulse { animation: pulseGlow 1s ease-in-out 3; border:2px solid #22c55e; }
    @keyframes pulseGlow { 0%{box-shadow:0 0 0 rgba(34,197,94,0)} 50%{box-shadow:0 0 24px rgba(34,197,94,0.75)} 100%{box-shadow:0 0 0 rgba(34,197,94,0)}}
  </style>
<script>
!function(t,e){var o,n,p,r;e.__SV||(window.posthog=e,e._i=[],e.init=function(i,s,a){function g(t,e){var o=e.split(".");2==o.length&&(t=t[o[0]],e=o[1]),t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}}(p=t.createElement("script")).type="text/javascript",p.async=!0,p.src=s.api_host+"/static/array.js",(r=t.getElementsByTagName("script")[0]).parentNode.insertBefore(p,r);var u=e;for(void 0!==a?u=e[a]=[]:a="posthog",u.people=u.people||[],u.toString=function(t){var e="posthog";return"posthog"!==a&&(e+="."+a),t||(e+=" (stub)"),e},u.people.toString=function(){return u.toString(1)+".people (stub)"},o="capture identify alias people.set people.set_once group identify_group reset isFeatureEnabled onFeatureFlags reloadFeatureFlags".split(" "),n=0;n<o.length;n++)g(u,o[n]);e._i.push([i,s,a])},e.__SV=1)}(document,window.posthog||[]);
posthog.init('phc_nSRmZ7SWGPUv6pZUp2iw9oZ4rCVmp7nArwDtHz2t2rpC', {
  api_host: 'https://us.i.posthog.com',
  autocapture: true,
  capture_pageview: true,
  disable_session_recording: false
});

posthog.capture("va_calculator_view");
</script>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>VA Rating Calculator</h1>
      <button class="btn-red" onclick="window.location.href='/dashboard'">Back</button>
    </div>

    <div class="card">
      <label class="label" for="vaRatings">All ratings (comma separated)</label>
      <input id="vaRatings" class="field" type="text" placeholder="50,30,10" />

      <label class="label" for="vaLeft">Left-side bilateral ratings (optional)</label>
      <input id="vaLeft" class="field" type="text" placeholder="10,20" />

      <label class="label" for="vaRight">Right-side bilateral ratings (optional)</label>
      <input id="vaRight" class="field" type="text" placeholder="10,20" />

      <label class="label"><input id="vaSpouse" type="checkbox" /> Spouse</label>
      <label class="label"><input id="vaSpouseAid" type="checkbox" /> Spouse gets Aid and Attendance</label>

      <label class="label" for="vaParents">Dependent parents</label>
      <select id="vaParents" class="field">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
      </select>

      <label class="label" for="vaChildU18">Children under 18</label>
      <input id="vaChildU18" class="field" type="number" min="0" value="0" />

      <label class="label" for="vaChildSchool">Children 18+ in qualifying school</label>
      <input id="vaChildSchool" class="field" type="number" min="0" value="0" />

      <button id="vaCalcBtn" class="btn btn-blue" type="button">Run VA Calculator</button>

      <div id="vaCalcResult" class="hidden card" style="margin-top:16px;"></div>
    </div>
  </div>

  <script>

function trackEvent(eventName, data = {}) {
  try {
    fetch("/track", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        event: eventName,
        data
      })
    });
  } catch (err) {
    console.log("track failed", err);
  }
}


    function getToken() {
      return localStorage.getItem("token") || "";
    }

    function parseRatingsInput(value) {
      return String(value || "")
        .split(",")
        .map(v => Number(String(v).trim()))
        .filter(v => !Number.isNaN(v) && v > 0);
    }

    async function runVACalc() {
  posthog.capture("va_calculator_run", {
    ratings: document.getElementById("vaRatings")?.value || "",
    left: document.getElementById("vaLeft")?.value || "",
    right: document.getElementById("vaRight")?.value || "",
    spouse: !!document.getElementById("vaSpouse")?.checked,
    spouse_aid: !!document.getElementById("vaSpouseAid")?.checked,
    parents: document.getElementById("vaParents")?.value || "",
    child_under_18: document.getElementById("vaChildUnder18")?.value || "",
    child_school: document.getElementById("vaChildSchool")?.value || ""
  });
      const ratings = parseRatingsInput(document.getElementById("vaRatings").value);
      const left = parseRatingsInput(document.getElementById("vaLeft").value);
      const right = parseRatingsInput(document.getElementById("vaRight").value);
      const spouse = document.getElementById("vaSpouse").checked;
      const spouse_aid = document.getElementById("vaSpouseAid").checked;
      const parents = Number(document.getElementById("vaParents").value || 0);
      const child_under_18 = Number(document.getElementById("vaChildU18").value || 0);
      const child_school = Number(document.getElementById("vaChildSchool").value || 0);
      const resultEl = document.getElementById("vaCalcResult");
      const btn = document.getElementById("vaCalcBtn");

      if (!ratings.length) {
        alert("Enter at least one rating");
        return;
      }

      const oldText = btn.innerText;
      btn.innerText = "Calculating...";
      btn.disabled = true;

      try {
        trackEvent("calculator_run", {
          page: "va_calculator",
          ratings: document.getElementById("vaRatings")?.value || "",
          left: document.getElementById("vaLeft")?.value || "",
          right: document.getElementById("vaRight")?.value || ""
        });
        const res = await fetch("/va/calc", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": getToken() ? "Bearer " + getToken() : ""
          },
          body: JSON.stringify({
            ratings, left, right, spouse, spouse_aid, parents, child_under_18, child_school
          })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          alert(data.error || "VA calculator failed");
          return;
        }

        resultEl.classList.remove("hidden");
        resultEl.classList.add("pulse");
        resultEl.innerHTML = `
          <div class="result-row"><b>Raw Combined:</b> ${data.raw}%</div>
          <div class="result-row"><b>Final VA Rating:</b> ${data.final}%</div>
          <div class="result-row"><b>Estimated Monthly:</b> $${data.monthly_estimate}</div>
          <div class="result-row"><b>Next tier:</b> ${data.next_needed ? "A new " + data.next_needed + "% rating" : "Already at max tier"}</div>
          <div class="muted">Standard VA compensation estimate only.

<div id="calcLeadBox" style="margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.12);">
  <div style="font-size:16px;font-weight:800;margin-bottom:6px;">
    Want help increasing this rating?
  </div>

  <div style="font-size:13px;opacity:0.85;margin-bottom:10px;">
    Send me your situation and I’ll review what could move you higher.
  </div>

  <form action="https://formsubmit.co/98be0a300ef3a84a84d7ecd13a15e620" method="POST" style="margin:0;">
    <input type="hidden" name="_subject" value="VA Calculator Lead">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_next" value="https://buildtrace-va.onrender.com/va-calculator.html">

    <input
      type="email"
      name="email"
      placeholder="Your email"
      required
      style="width:100%;padding:10px;margin-bottom:8px;border-radius:8px;border:none;"
    />

    <textarea
      name="details"
      placeholder="Optional: conditions you're claiming, current rating, what you're trying to reach..."
      style="width:100%;padding:10px;margin-bottom:8px;border-radius:8px;border:none;min-height:100px;"
    ></textarea>

    <button
      type="submit"
      style="width:100%;padding:12px;background:#111;color:#fff;border:none;border-radius:8px;font-weight:700;"
    >
      Get Full Claim Review
    </button>
  </form>
</div>
</div>
        `;
        resultEl.scrollIntoView({ behavior: "smooth", block: "start" });
        setTimeout(() => resultEl.classList.remove("pulse"), 3200);
      } catch (err) {
        alert(err.message || "VA calculator failed");
      } finally {
        btn.innerText = oldText;
        btn.disabled = false;
      }
    }

    document.getElementById("vaCalcBtn").addEventListener("click", runVACalc);
trackEvent("page_view", { page: "va_calculator" });
  </script>
</body>
</html>
