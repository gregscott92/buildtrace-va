<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VA Claim Analyzer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #041b4d;
      color: #ffffff;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }
    .card {
      background: #0a2566;
      border-radius: 20px;
      padding: 18px;
      margin-top: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    }
    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 14px;
    }
    .muted {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.45;
    }
    textarea {
      width: 100%;
      min-height: 150px;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 18px;
      line-height: 1.4;
      resize: vertical;
      background: #f2f4f8;
      color: #111827;
    }
    .actions {
      display: grid;
      gap: 14px;
      margin-top: 16px;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 20px 18px;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
    }
    .btn-upload { background: #2563eb; color: #ffffff; }
    .btn-clear { background: #475569; color: #ffffff; }
    .btn-analyze { background: #18a84a; color: #ffffff; }
    .btn-saved { background: #ebedf0; color: #111111; }
    .btn-access { background: #f59e0b; color: #111111; }
    .btn-report { background: #ef4444; color: #ffffff; }
    .field-note { margin-top: 10px; color: #cbd5e1; font-size: 14px; }
    .hidden { display: none; }
    .result-row {
      font-size: 18px;
      line-height: 1.45;
      margin-bottom: 10px;
    }
    .label {
      font-weight: 800;
    }
    .summary {
      margin-top: 14px;
      font-size: 16px;
      line-height: 1.55;
    }
    .error {
      background: #7f1d1d;
      color: #fee2e2;
      border-radius: 14px;
      padding: 12px 14px;
      margin-top: 14px;
      line-height: 1.4;
    }
    input[type="email"], select {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      background: #f2f4f8;
      color: #111827;
    }
    .mini-card {
      margin-top: 20px;
      padding: 16px;
      background: #0b1f4a;
      border-radius: 14px;
    }
    .pulse-result {
      animation: pulseGlow 1s ease-in-out 3;
      border: 2px solid #22c55e;
    }
    @keyframes pulseGlow {
      0% { box-shadow: 0 0 0 rgba(34,197,94,0); }
      50% { box-shadow: 0 0 24px rgba(34,197,94,0.75); }
      100% { box-shadow: 0 0 0 rgba(34,197,94,0); }
    }
    .top-space { margin-top: 10px; }
    .check-row { display:block; margin-bottom:12px; font-size:16px; }
    ul { margin-top: 8px; padding-left: 22px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;">
      <div style="font-size:28px;font-weight:800;">VA Claim Analyzer</div>
      <button id="logoutBtn" type="button" style="width:auto;padding:12px 16px;border:none;border-radius:12px;background:#ef4444;color:#fff;font-weight:800;cursor:pointer;">Log Out</button>
    </div>

    <div class="card" id="disclaimerCard">
      <div class="section-title">Disclaimer</div>
      <div class="muted">
        This is an estimate and guidance tool only. Final VA decisions depend on your records,
        exams, service connection evidence, and adjudication.
      </div>
    </div>
    <div class="card">
      <div class="section-title">Describe the claim</div>
      <textarea id="serviceContext" placeholder="Describe the condition, symptoms, when it started, treatment, severity, flare-ups, and work/life impact..."></textarea>

      <div class="actions">
        <button id="analyzeBtn" class="btn-analyze" type="button">Analyze Claim</button>
        <button class="btn-saved" type="button" onclick="window.location.href='/saved-claims.html'">View Saved Claims</button>
        <button class="btn-upload" type="button" onclick="window.location.href='/va-calculator.html'">Open VA Calculator</button>
      </div>

      <div id="errorCard" class="error hidden"></div>
    </div>

    <div class="card">
      <div class="section-title">Quick Claim Inputs</div>

      <label class="check-row">
        <input id="inServiceEvent" type="checkbox" />
        In-service event / injury / onset documented
      </label>

      <label class="check-row">
        <input id="currentDiagnosis" type="checkbox" />
        Current diagnosis exists
      </label>

      <label class="check-row">
        <input id="nexusLetter" type="checkbox" />
        Nexus letter / medical opinion exists
      </label>

      <div class="top-space">
        <div class="section-title" style="font-size:16px; margin-bottom:8px;">Severity</div>
        <select id="severity">
          <option value="mild">Mild</option>
          <option value="moderate" selected>Moderate</option>
          <option value="severe">Severe</option>
        </select>
      </div>
    </div>

    <div id="resultCard" class="card hidden"></div>

    <div class="card">
      <div class="actions" style="margin-top:0;">
        <button class="btn-access" type="button" onclick="window.location.href='mailto:greg.scott92@icloud.com?subject=Request%20Full%20Access%20to%20BuildTrace%20VA'">Request Full Access</button>
        <button class="btn-report" type="button" onclick="window.location.href='mailto:greg.scott92@icloud.com?subject=BuildTrace%20VA%20Issue%20or%20Suggested%20Fix'">Report Issue / Suggest Fix</button>
      </div>
    </div>

  </div>

  <script>
    function logout() {
      localStorage.removeItem("token");
      window.location.href = "/login";
    }

    function getToken() {
      return localStorage.getItem("token") || "";
    }

    function showError(message) {
      const el = document.getElementById("errorCard");
      el.textContent = message || "Something went wrong";
      el.classList.remove("hidden");
    }

    function clearError() {
      const el = document.getElementById("errorCard");
      el.textContent = "";
      el.classList.add("hidden");
    }

    async function saveLead() {
      const emailEl = document.getElementById("userEmail");
      const statusEl = document.getElementById("leadStatus");
      const btnEl = document.getElementById("saveLeadBtn");
      const email = String(emailEl?.value || "").trim();
      const lastResult = JSON.parse(localStorage.getItem("lastResult") || "{}");

      if (!email) {
        statusEl.textContent = "Enter an email first.";
        return;
      }

      btnEl.disabled = true;
      btnEl.innerText = "Saving...";
      statusEl.textContent = "";

      try {
        const res = await fetch("/lead", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email,
            data: lastResult
          })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          statusEl.textContent = data.error || "Failed to save lead.";
          btnEl.disabled = false;
          btnEl.innerText = "Save My Claim";
          return;
        }

        statusEl.textContent = "Saved. We’ll send next steps.";
        btnEl.innerText = "Saved";
      } catch (err) {
        statusEl.textContent = err.message || "Failed to save lead.";
        btnEl.disabled = false;
        btnEl.innerText = "Save My Claim";
      }
    }

    async function runAnalyze() {
      try {
        clearError();

        const token = getToken();

        let condition = document.getElementById("serviceContext")?.value || "";
if (!condition.trim()) {
  condition = "General condition";
}
        const in_service_event = document.getElementById("inServiceEvent")?.checked || false;
        const current_diagnosis = document.getElementById("currentDiagnosis")?.checked || false;
        const nexus_letter = document.getElementById("nexusLetter")?.checked || false;
        const severity = document.getElementById("severity")?.value || "moderate";

        const btn = document.getElementById("analyzeBtn");
        const oldText = btn.innerText;
        btn.disabled = true;
        btn.innerText = "Analyzing...";

        const res = await fetch("/analyze", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            condition,
            in_service_event,
            current_diagnosis,
            nexus_letter,
            severity
          })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          if (res.status === 401) {
            showError("This feature is temporarily unavailable.");
            btn.disabled = false;
            btn.innerText = oldText;
            return;
          }
          showError(data.error || "Need more info. Try checking diagnosis or adding more detail.");
          btn.disabled = false;
          btn.innerText = oldText;
          return;
        }

        const r = data.result || {};
        localStorage.setItem("lastResult", JSON.stringify(r));

        const el = document.getElementById("resultCard");
        el.classList.remove("hidden");
        el.classList.add("pulse-result");

        const missingHtml = (r.missing || []).length
          ? `<div class="summary">
              <span class="label">What’s Missing:</span>
              <ul>${(r.missing || []).map(item => `<li>${item}</li>`).join("")}</ul>
            </div>`
          : "";

        const nextStepsHtml = (r.next_steps || []).length
          ? `<div class="summary">
              <span class="label">Next Steps:</span>
              <ul>${(r.next_steps || []).map(step => `<li>${step}</li>`).join("")}</ul>
            </div>`
          : "";

        el.innerHTML = `
          <h2 class="section-title">Claim Result</h2>

          <div class="result-row"><span class="label">Condition:</span> ${r.condition || "Unknown"}</div>
          <div class="result-row"><span class="label">Claim Type:</span> ${r.claim_type || "Unclear"}</div>
          <div class="result-row"><span class="label">Service Connection:</span> ${r.service_connection || "Unknown"}</div>
          <div class="result-row"><span class="label">Estimated Rating:</span> ${r.estimated_rating || "Unknown"}</div>
          <div class="result-row"><span class="label">Confidence:</span> ${r.confidence || "Unknown"}</div>

          <div class="summary">
            <span class="label">Why:</span><br>
            ${r.why || ""}
          </div>

          <div class="summary">
            <span class="label">Biggest Lever:</span><br>
            ${r.biggest_lever || ""}
          </div>

          <div class="summary">
            <span class="label">What Helps This Claim:</span>
            <ul>${(r.helping_factors || []).map(item => `<li>${item}</li>`).join("")}</ul>
          </div>

          <div class="summary">
            <span class="label">What Hurts This Claim:</span>
            <ul>${(r.hurting_factors || []).map(item => `<li>${item}</li>`).join("")}</ul>
          </div>

          ${missingHtml}
          ${nextStepsHtml}

          <div class="summary">
            <span class="label">C&P Advice:</span><br>
            ${r.cp_advice || ""}
          </div>

          <div class="mini-card">
            <div style="font-weight:700; margin-bottom:6px;">Save this claim</div>
            <div class="muted" style="margin-bottom:10px;">Get this result and next steps emailed to you.</div>

            <input id="userEmail" type="email" placeholder="Enter email" />

            <button
              id="saveLeadBtn"
              onclick="saveLead()"
              style="margin-top:10px; width:100%; padding:14px; background:#22c55e; color:white; border:none; border-radius:10px; font-size:16px; font-weight:700;"
            >
              Save My Claim
            </button>

            <div id="leadStatus" class="muted" style="margin-top:10px;"></div>
          </div>
        `;

        el.scrollIntoView({ behavior: "smooth", block: "start" });

        setTimeout(() => {
          el.classList.remove("pulse-result");
        }, 2500);

        btn.disabled = false;
        btn.innerText = oldText;
      } catch (err) {
        console.log(err);
        showError("Something broke");
        const btn = document.getElementById("analyzeBtn");
        btn.disabled = false;
        btn.innerText = "Analyze Claim";
      }
    }

    document.getElementById("analyzeBtn").addEventListener("click", runAnalyze);
    
    document.getElementById("logoutBtn").addEventListener("click", logout);
  
    const logoutBtn = document.getElementById("logoutBtn");
    if (logoutBtn && !getToken()) {
      logoutBtn.style.display = "none";
    }

  </script>
</body>
</html>
