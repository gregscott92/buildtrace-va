<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BuildTrace VA</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #06153a;
      color: white;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
    }
    h1 {
      font-size: 52px;
      font-weight: 700;
      text-align: center;
      margin: 40px 0 10px;
    }
    .sub {
      color: #aab4c8;
      font-size: 18px;
      text-align: center;
      margin-bottom: 24px;
    }
    .label {
      color: white;
      margin-bottom: 8px;
      font-weight: 600;
      display: block;
    }
    textarea {
      width: 100%;
      background: white;
      color: #111827;
      border: 0;
      border-radius: 12px;
      padding: 14px;
      min-height: 110px;
      margin-bottom: 16px;
      font-size: 16px;
      resize: vertical;
    }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 18px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-blue {
      background: #2563eb;
      color: white;
      margin-bottom: 18px;
    }
    .btn-green {
      background: #16a34a;
      color: white;
      margin-bottom: 24px;
    }
    .btn:disabled {
      background: #64748b;
      cursor: not-allowed;
    }
    .preview {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 18px;
      display: none;
    }
    .card {
      background: white;
      color: #111827;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 30px;
    }
    .warning {
      background: #fff7ed;
      border: 1px solid #fdba74;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .warning-title {
      font-size: 14px;
      color: #9a3412;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .warning-body {
      font-size: 14px;
      color: #7c2d12;
    }
    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 12px;
    }
    .field {
      font-size: 16px;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .field strong {
      font-weight: 700;
    }
    .block-title {
      font-size: 18px;
      font-weight: 700;
      margin: 18px 0 8px;
    }
    .block-sub {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .item {
      font-size: 15px;
      margin-bottom: 6px;
      line-height: 1.5;
    }
    .loading {
      text-align: center;
      margin-bottom: 20px;
      color: white;
    }
    .claims-wrap {
      margin-top: 10px;
      margin-bottom: 30px;
    }
    .claims-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .claim-row {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      color: white;
    }
    .claim-row small {
      color: #aab4c8;
      display: block;
      margin-top: 6px;
    }
    .topbar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 10px;
      margin-bottom: 10px;
    }
    .topbtn {
      background: #7f1d1d;
      color: white;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .muted {
      color: #aab4c8;
    }
    .hidden-file {
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <form method="POST" action="/logout">
        <button class="topbtn" type="submit">Logout</button>
      </form>
    </div>

    <h1>VA Mode</h1>
    <div class="sub">Upload evidence and describe the condition or claim issue.</div>

    <label class="label" for="issue">Short description</label>
    <textarea
      id="issue"
      placeholder="Example: lower back pain, tinnitus, knee issue, migraine records"
    ></textarea>

    <label class="label" for="serviceContext">Service context</label>
    <textarea
      id="serviceContext"
      placeholder="Example: deployed 2010-2011, airborne ops, MOS, injury event, hearing exposure"
      style="min-height: 90px;"
    ></textarea>

    <input id="fileInput" class="hidden-file" type="file" accept="image/*,.jpg,.jpeg,.png,.webp" />

    <button id="pickBtn" class="btn btn-blue" type="button">Upload Image</button>

    <img id="preview" class="preview" alt="Preview" />

    <button id="analyzeBtn" class="btn btn-green" type="button">Analyze Claim</button>

    <div id="loading" class="loading" style="display:none;">Analyzing...</div>

    <div id="resultMount"></div>

    <div class="claims-wrap">
      <div class="claims-title">Saved VA Claims</div>
      <div id="claimsList" class="muted">Loading...</div>
    </div>
  </div>

  <script>
    let uploadedImageDataUrl = "";

    function bulletize(value) {
      if (!value) return [];
      if (Array.isArray(value)) return value.filter(Boolean).map(String);
      return String(value)
        .split(/\n|•|^- /gm)
        .map(x => x.trim())
        .filter(Boolean)
        .map(x => x.replace(/^-+\s*/, "").trim());
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function confidenceColor(value) {
      if (value === "High") return "#15803d";
      if (value === "Medium") return "#d97706";
      if (value === "Low") return "#b91c1c";
      return "#111827";
    }

    function renderItems(items, fallback) {
      if (items && items.length) {
        return items.map(item => `<div class="item">• ${escapeHtml(item)}</div>`).join("");
      }
      return `<div class="item">${escapeHtml(fallback || "N/A")}</div>`;
    }

    function renderResult(data) {
      const structured = data?.structured || data?.parsed || {};
      const reasoningItems = bulletize(structured.reasoning);
      const evidenceItems = bulletize(structured.evidenceNeeded);
      const nextStepItems = bulletize(structured.nextSteps);
      const importantItems = bulletize(structured.important);

      const hasEvidenceGap =
        structured.evidenceNeeded &&
        structured.evidenceNeeded !== "N/A" &&
        bulletize(structured.evidenceNeeded).length > 0;

      const confidence = structured.confidence || "N/A";

      return `
        <div class="card">
          <div class="section-title">Result</div>

          ${hasEvidenceGap ? `
            <div class="warning">
              <div class="warning-title">Warning</div>
              <div class="warning-body">
                Your claim may be weak without the missing evidence listed below.
              </div>
            </div>
          ` : ""}

          <div class="field"><strong>Condition:</strong> ${escapeHtml(structured.condition || "N/A")}</div>
          <div class="field"><strong>Diagnostic Code:</strong> ${escapeHtml(structured.diagnosticCode || "N/A")}</div>
          <div class="field"><strong>Estimated Rating:</strong> ${escapeHtml(structured.estimatedRating || data.likelihood || "N/A")}</div>
          <div class="field">
            <strong>Confidence:</strong>
            <span style="color:${confidenceColor(confidence)};font-weight:700;">${escapeHtml(confidence)}</span>
          </div>

          <div class="block-title">Reasoning</div>
          ${renderItems(reasoningItems, structured.reasoning)}

          <div class="block-title">Evidence Still Needed</div>
          ${renderItems(evidenceItems, structured.evidenceNeeded)}

          <div class="block-title">Next Steps</div>
          <div class="block-sub">Focus here first to improve the claim.</div>
          ${renderItems(nextStepItems, structured.nextSteps)}

          <div class="block-title">Important</div>
          ${renderItems(importantItems, structured.important)}

          <div class="warning" style="margin-top:16px;">
            <div class="warning-title">Disclaimer</div>
            <div class="warning-body">
              ${escapeHtml(data.disclaimer || "This tool provides an estimate only. Final determinations are made by the VA.")}
            </div>
          </div>
        </div>
      `;
    }

    async function fileToDataUrl(file) {
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function loadClaims() {
  try {
    const el = document.getElementById("claimsList");
    el.innerText = "CLAIMS SCRIPT RAN";

    const res = await fetch("/claims");
    const data = await res.json();

    console.log("CLAIMS RESPONSE:", data);

    if (!res.ok) {
      el.innerText = data.details || data.error || "Failed to load claims";
      return;
    }

    const claims = Array.isArray(data.claims) ? data.claims : [];

    if (!claims.length) {
      el.innerText = "No saved claims yet.";
      return;
    }

    el.innerHTML = claims.map(c => {
      const condition = c.detected_condition || c.condition || "N/A";
      const rating = c.estimated_rating ?? "N/A";
      const confidence = c.confidence_label || c.confidence || "N/A";
      const date = c.created_at ? new Date(c.created_at).toLocaleString() : "";

      return `
        <div style="margin-bottom:15px;padding:10px;border:1px solid #333;border-radius:8px;">
          <div><strong>Condition:</strong> ${condition}</div>
          <div><strong>Rating:</strong> ${rating}%</div>
          <div><strong>Confidence:</strong> ${confidence}</div>
          <div style="font-size:12px;color:#aaa;margin-top:5px;">
            ${date}
          </div>
        </div>
      `;
    }).join("");

  } catch (err) {
    console.error("LOAD CLAIMS ERROR:", err);
    document.getElementById("claimsList").innerText =
      err.message || "Error loading claims";
  }
}
;
        try {
          data = JSON.parse(text);
        } catch {
          el.innerText = text || "Failed to load claims";
          return;
        }

        if (!res.ok) {
          el.innerText = data.details || data.error || "Failed to load claims";
          return;
        }

        const claims = Array.isArray(data.claims) ? data.claims : [];

        if (!claims.length) {
          el.innerText = "No claims yet.";
          return;
        }

        el.innerHTML = claims.map(claim => `
          <div class="claim-row">
            <div><strong>${escapeHtml(claim.detected_condition || claim.title || "Untitled Claim")}</strong></div>
            <div>${escapeHtml(claim.export_summary || claim.result_text || claim.summary || "")}</div>
            <small>${escapeHtml(claim.created_at || "")}</small>
          </div>
        `).join("");
      } catch (err) {
        el.innerText = err.message || "Failed to load claims";
      }
    }

    async function handleAnalyze() {
      const issue = String(document.getElementById("issue").value || "").trim();
      const serviceContext = String(document.getElementById("serviceContext").value || "").trim();
      const resultMount = document.getElementById("resultMount");
      const loading = document.getElementById("loading");
      const analyzeBtn = document.getElementById("analyzeBtn");

      if (!issue && !serviceContext && !uploadedImageDataUrl) {
        resultMount.innerHTML = `
          <div class="card">
            <div class="section-title">Result</div>
            <div class="item">Enter your condition details first.</div>
          </div>
        `;
        return;
      }

      try {
        loading.style.display = "block";
        analyzeBtn.disabled = true;
        resultMount.innerHTML = "";

        const payload = {
          issue,
          serviceContext,
          imageBase64: uploadedImageDataUrl,
          normalizedImageBase64: uploadedImageDataUrl
        };

        const res = await fetch("/va/analyze-base64", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const raw = await res.text();

        let data = {};
        try {
          data = JSON.parse(raw);
        } catch {
          resultMount.innerHTML = `
            <div class="card">
              <div class="section-title">Result</div>
              <div class="item">${escapeHtml(raw || "Invalid server response")}</div>
            </div>
          `;
          return;
        }

        if (!res.ok || !data.success) {
          resultMount.innerHTML = `
            <div class="card">
              <div class="section-title">Result</div>
              <div class="item">${escapeHtml(data.details || data.error || "Analysis failed")}</div>
            </div>
          `;
          return;
        }

        resultMount.innerHTML = renderResult(data);
      } catch (err) {
        resultMount.innerHTML = `
          <div class="card">
            <div class="section-title">Result</div>
            <div class="item">${escapeHtml(err.message || "Network error")}</div>
          </div>
        `;
      } finally {
        loading.style.display = "none";
        analyzeBtn.disabled = false;
      }
    }

    document.getElementById("pickBtn").addEventListener("click", function () {
      document.getElementById("fileInput").click();
    });

    document.getElementById("fileInput").addEventListener("change", async function (e) {
      const file = e.target.files && e.target.files[0];
      const preview = document.getElementById("preview");
      const pickBtn = document.getElementById("pickBtn");

      if (!file) {
        uploadedImageDataUrl = "";
        preview.style.display = "none";
        preview.removeAttribute("src");
        pickBtn.innerText = "Upload Image";
        return;
      }

      uploadedImageDataUrl = await fileToDataUrl(file);
      preview.src = uploadedImageDataUrl;
      preview.style.display = "block";
      pickBtn.innerText = "Change Image";
    });

    document.getElementById("analyzeBtn").addEventListener("click", handleAnalyze);

    loadClaims();
  </script>

<script>
(function () {
  async function renderClaimsStandalone() {
    const el = document.getElementById("claimsList");
    if (!el) return;

    el.innerText = "Loading...";

    try {
      const res = await fetch("/claims");
      const data = await res.json();

      if (!res.ok) {
        el.innerText = data.details || data.error || "Failed to load claims";
        return;
      }

      const claims = Array.isArray(data.claims) ? data.claims : [];

      if (!claims.length) {
        el.innerText = "No saved claims yet.";
        return;
      }

      el.innerHTML = claims.map(function (c) {
        const condition = c.detected_condition || c.condition || "N/A";
        const rating =
          c.estimated_rating === null || c.estimated_rating === undefined
            ? "N/A"
            : c.estimated_rating;
        const confidence = c.confidence_label || c.confidence || "N/A";
        const date = c.created_at ? new Date(c.created_at).toLocaleString() : "";

        return `
          <div style="margin-bottom:15px;padding:12px;border:1px solid #334155;border-radius:10px;background:#0b1220;color:#e2e8f0;">
            <div style="margin-bottom:6px;"><strong>Condition:</strong> ${condition}</div>
            <div style="margin-bottom:6px;"><strong>Rating:</strong> ${rating}%</div>
            <div style="margin-bottom:6px;"><strong>Confidence:</strong> ${confidence}</div>
            <div style="font-size:12px;color:#94a3b8;margin-top:6px;">${date}</div>
          </div>
        `;
      }).join("");
    } catch (err) {
      el.innerText = err.message || "Error loading claims";
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", renderClaimsStandalone);
  } else {
    renderClaimsStandalone();
  }
})();
</script>

</body>
</html>
