<!DOCTYPE html>
<html>
<head>
  <title>VA Claim Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body style="font-family: Arial; padding: 20px; background:#0b1b34; color:white;">

<h2>VA Claim Analyzer</h2>

<textarea id="context" placeholder="Describe your condition..." style="width:100%; height:100px;"></textarea>

<br><br>

<button id="analyzeBtn">Analyze</button>
<button id="loadBtn">View Saved Claims</button>

<div id="resultCard" style="margin-top:20px;"></div>

<div id="claimsCard" style="margin-top:20px;"></div>

<script>
async function analyze() {
  const text = document.getElementById("context").value.trim();

  const res = await fetch("/va/analyze-base64", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + localStorage.getItem("token")
    },
    body: JSON.stringify({
      issue: "",
      serviceContext: text,
      imageBase64: ""
    })
  });

  const data = await res.json();

  document.getElementById("resultCard").innerHTML =
    "<b>Condition:</b> " + (data.structured?.condition || "N/A") + "<br>" +
    "<b>Rating:</b> " + (data.structured?.estimatedRating || "N/A") + "<br>" +
    "<b>Confidence:</b> " + (data.structured?.confidence || "N/A");
}

async function loadClaims() {
  const res = await fetch("/claims", {
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    }
  });

  const data = await res.json();

  const container = document.getElementById("claimsCard");

  container.innerHTML = data.claims.map(c => `
    <div style="border:1px solid #444; padding:10px; margin:10px 0;">
      <b>${c.detected_condition || "N/A"}</b><br>
      Rating: ${c.estimated_rating ?? "N/A"}<br>
      Confidence: ${c.confidence_label || "N/A"}
    </div>
  `).join("");
}

document.getElementById("analyzeBtn").onclick = analyze;
document.getElementById("loadBtn").onclick = loadClaims;
</script>

</body>
</html>
