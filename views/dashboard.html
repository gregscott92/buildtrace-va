<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BuildTrace VA</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #06153a;
      color: white;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
    }
    h1 {
      font-size: 52px;
      font-weight: 700;
      text-align: center;
      margin: 40px 0 10px;
    }
    .sub {
      color: #aab4c8;
      font-size: 18px;
      text-align: center;
      margin-bottom: 24px;
    }
    .label {
      color: white;
      margin-bottom: 8px;
      font-weight: 600;
      display: block;
    }
    textarea {
      width: 100%;
      background: white;
      color: #111827;
      border: 0;
      border-radius: 12px;
      padding: 14px;
      min-height: 110px;
      margin-bottom: 16px;
      font-size: 16px;
      resize: vertical;
    }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 18px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-blue {
      background: #2563eb;
      color: white;
      margin-bottom: 18px;
    }
    .btn-green {
      background: #16a34a;
      color: white;
      margin-bottom: 24px;
    }
    .btn:disabled {
      background: #64748b;
      cursor: not-allowed;
    }
    .preview {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 18px;
      display: none;
    }
    .card {
      background: white;
      color: #111827;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 30px;
    }
    .warning {
      background: #fff7ed;
      border: 1px solid #fdba74;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .warning-title {
      font-size: 14px;
      color: #9a3412;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .warning-body {
      font-size: 14px;
      color: #7c2d12;
    }
    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 12px;
    }
    .field {
      font-size: 16px;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .field strong {
      font-weight: 700;
    }
    .block-title {
      font-size: 18px;
      font-weight: 700;
      margin: 18px 0 8px;
    }
    .block-sub {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .item {
      font-size: 15px;
      margin-bottom: 6px;
      line-height: 1.5;
    }
    .loading {
      text-align: center;
      margin-bottom: 20px;
      color: white;
    }
    .claims-wrap {
      margin-top: 10px;
      margin-bottom: 30px;
    }
    .claims-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .claim-row {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      color: white;
    }
    .claim-row small {
      color: #aab4c8;
      display: block;
      margin-top: 6px;
    }
    .topbar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 10px;
      margin-bottom: 10px;
    }
    .topbtn {
      background: #7f1d1d;
      color: white;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .muted {
      color: #aab4c8;
    }
    .hidden-file {
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <form method="POST" action="/logout">
        <button class="topbtn" type="submit">Logout</button>
      </form>
    </div>

    <h1>VA Mode</h1>
    <div class="sub">Upload evidence and describe the condition or claim issue.</div>

    <label class="label" for="issue">Short description</label>
    <textarea
      id="issue"
      placeholder="Example: lower back pain, tinnitus, knee issue, migraine records"
    ></textarea>

    <label class="label" for="serviceContext">Service context</label>
    <textarea
      id="serviceContext"
      placeholder="Example: deployed 2010-2011, airborne ops, MOS, injury event, hearing exposure"
      style="min-height: 90px;"
    ></textarea>

    <input id="fileInput" class="hidden-file" type="file" accept="image/*,.jpg,.jpeg,.png,.webp" />

    <button id="pickBtn" class="btn btn-blue" type="button" id="uploadBtn">Upload Image</button>

    <img id="preview" class="preview" alt="Preview" />

    <button id="analyzeBtn" onclick="handleAnalyze()" class="btn btn-green" type="button">Analyze Claim</button>

    <div id="loading" class="loading" style="display:none;">Analyzing...</div>

    <div id="resultMount"></div>

    <div class="claims-wrap">
      <div class="claims-title">Saved VA Claims</div>
      <div id="claimsList" class="muted">Loading...</div>
    </div>
  </div>

  

<script>
(function () {
  async function renderClaimsStandalone() {
    const el = document.getElementById("claimsList");
    if (!el) return;

    el.innerText = "Loading...";

    try {
      const res = await fetch("/claims");
      const data = await res.json();

      if (!res.ok) {
        el.innerText = data.details || data.error || "Failed to load claims";
        return;
      }

      const claims = Array.isArray(data.claims) ? data.claims : [];

      if (!claims.length) {
        el.innerText = "No saved claims yet.";
        return;
      }

      el.innerHTML = claims.map(function (c) {
        const condition = c.detected_condition || c.condition || "N/A";
        const rating =
          c.estimated_rating === null || c.estimated_rating === undefined
            ? "N/A"
            : c.estimated_rating;
        const confidence = c.confidence_label || c.confidence || "N/A";
        const confidenceColor =
          confidence === "High" ? "#16a34a" :
          confidence === "Medium" ? "#d97706" :
          confidence === "Low" ? "#dc2626" :
          "#e2e8f0";
        const date = c.created_at ? new Date(c.created_at).toLocaleString() : "";

        return `
          <div style="margin-bottom:15px;padding:12px;border:1px solid #334155;border-radius:10px;background:#0b1220;color:#e2e8f0;">
            <div style="margin-bottom:6px;"><strong>Condition:</strong> ${condition}</div>
            <div style="margin-bottom:6px;"><strong>Rating:</strong> ${rating}%</div>
            <div style="margin-bottom:6px;"><strong>Confidence:</strong> <span style="color:${confidenceColor};font-weight:700;">${confidence}</span></div>
            <div style="font-size:12px;color:#94a3b8;margin-top:6px;">${date}</div>
          </div>
        `;
      }).join("");
    } catch (err) {
      el.innerText = err.message || "Error loading claims";
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", renderClaimsStandalone);
  } else {
    renderClaimsStandalone();
  }
})();

async function handleAnalyze() {
  const issue = String(document.getElementById("issue")?.value || "").trim();
  const serviceContext = String(document.getElementById("serviceContext")?.value || "").trim();
  const resultMount = document.getElementById("resultMount");
  const loading = document.getElementById("loading");
  const analyzeBtn = document.getElementById("analyzeBtn");

  if (!resultMount) {
    alert("Result area not found");
    return;
  }

  if (!issue && !serviceContext && !uploadedImageDataUrl) {
    resultMount.innerHTML = `
      <div class="card">
        <div class="section-title">Result</div>
        <div class="item">Enter your condition details first.</div>
      </div>
    `;
    return;
  }

  try {
    if (loading) loading.style.display = "block";
    if (analyzeBtn) {
      analyzeBtn.disabled = true;
      analyzeBtn.style.opacity = "0.7";
    }

    const payload = {
      issue,
      serviceContext,
      normalizedImageBase64: uploadedImageDataUrl || ""
    };

    const response = await fetch("/va/analyze-base64", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data?.details || data?.error || "Analysis failed");
    }

    const parsed = data.structured || data.parsed || {};
    const condition = parsed.condition || "N/A";
    const diagnosticCode = parsed.diagnosticCode || "N/A";
    const estimatedRating = parsed.estimatedRating || data.likelihood || "N/A";
    const confidence = parsed.confidence || "N/A";
    const reasoning = parsed.reasoning || "N/A";
    const evidenceNeeded = parsed.evidenceNeeded || "N/A";
    const nextSteps = parsed.nextSteps || "N/A";
    const important = parsed.important || "N/A";
    const disclaimer =
      data.disclaimer ||
      "This tool provides an estimate only. Final determinations are made by the VA.";

    resultMount.innerHTML = `
      <div class="card">
        <div class="section-title">Result</div>
        <div class="item"><strong>Condition:</strong> ${condition}</div>
        <div class="item"><strong>Diagnostic Code:</strong> ${diagnosticCode}</div>
        <div class="item"><strong>Estimated Rating:</strong> ${estimatedRating}</div>
        <div class="item"><strong>Confidence:</strong> ${confidence}</div>
        <div class="item"><strong>Reasoning:</strong><br>${String(reasoning).replace(/\n/g, "<br>")}</div>
        <div class="item"><strong>Evidence Still Needed:</strong><br>${String(evidenceNeeded).replace(/\n/g, "<br>")}</div>
        <div class="item"><strong>Next Steps:</strong><br>${String(nextSteps).replace(/\n/g, "<br>")}</div>
        <div class="item"><strong>Important:</strong><br>${String(important).replace(/\n/g, "<br>")}</div>
        <div class="item" style="margin-top:14px;font-size:13px;color:#94a3b8;">
          <strong>Disclaimer:</strong> ${disclaimer}
        </div>
      </div>
    `;
  } catch (err) {
    resultMount.innerHTML = `
      <div class="card">
        <div class="section-title">Result</div>
        <div class="item">${err?.message || "Analysis failed"}</div>
      </div>
    `;
  } finally {
    if (loading) loading.style.display = "none";
    if (analyzeBtn) {
      analyzeBtn.disabled = false;
      analyzeBtn.style.opacity = "1";
    }
  }
}

document.getElementById("analyzeBtn")?.addEventListener("click", handleAnalyze);


let uploadedImageDataUrl = "";

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ""));
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

const hiddenImageInput = document.createElement("input");
hiddenImageInput.type = "file";
hiddenImageInput.accept = "image/*";
hiddenImageInput.style.display = "none";
document.body.appendChild(hiddenImageInput);

hiddenImageInput.addEventListener("change", async function () {
  const file = hiddenImageInput.files && hiddenImageInput.files[0];

  if (!file) {
    uploadedImageDataUrl = "";
    return;
  }

  try {
    uploadedImageDataUrl = await fileToDataUrl(file);

    const uploadBtn = document.getElementById("uploadBtn");
    if (uploadBtn) {
      uploadBtn.innerText = "Change Image";
    }
  } catch (err) {
    uploadedImageDataUrl = "";
    alert(err?.message || "Could not read image");
  }
});

document.getElementById("uploadBtn")?.addEventListener("click", function () {
  hiddenImageInput.click();
});

</script>

</body>
</html>
