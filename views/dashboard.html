<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BuildTrace VA</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #06153a;
      color: white;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
    }
    h1 {
      font-size: 52px;
      font-weight: 700;
      text-align: center;
      margin: 40px 0 10px;
    }
    .sub {
      color: #aab4c8;
      font-size: 18px;
      text-align: center;
      margin-bottom: 24px;
    }
    .label {
      color: white;
      margin-bottom: 8px;
      font-weight: 600;
      display: block;
    }
    textarea {
      width: 100%;
      background: white;
      color: #111827;
      border: 0;
      border-radius: 12px;
      padding: 14px;
      min-height: 110px;
      margin-bottom: 16px;
      font-size: 16px;
      resize: vertical;
    }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 18px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-blue {
      background: #2563eb;
      color: white;
      margin-bottom: 18px;
    }
    .btn-green {
      background: #16a34a;
      color: white;
      margin-bottom: 24px;
    }
    .btn:disabled {
      background: #64748b;
      cursor: not-allowed;
    }
    .preview {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 18px;
      display: none;
    }
    .card {
      background: white;
      color: #111827;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 30px;
    }
    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 12px;
    }
    .item {
      font-size: 15px;
      margin-bottom: 6px;
      line-height: 1.5;
    }
    .loading {
      text-align: center;
      margin-bottom: 20px;
      color: white;
    }
    .claims-wrap {
      margin-top: 10px;
      margin-bottom: 30px;
    }
    .claims-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .topbar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 10px;
      margin-bottom: 10px;
    }
    .topbtn {
      background: #7f1d1d;
      color: white;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .muted {
      color: #aab4c8;
    }
    .hidden-file {
      display: none;
    }
    .notice {
      background: #fff7ed;
      border: 1px solid #fdba74;
      color: #7c2d12;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 18px;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <form method="POST" action="/logout">
        <button class="topbtn" type="submit">Logout</button>
      </form>
    </div>

    <h1>VA Mode</h1>
    <div class="sub">Upload evidence and describe the condition or claim issue.</div>

    <div class="notice">
      <strong>Do not enter PII.</strong> Do not upload or type SSNs, full addresses, dates of birth, claim numbers, bank info, or other sensitive personal identifiers.
    </div>

    <label class="label" for="issue">Short description</label>
    <textarea
      id="issue"
      placeholder="Example: lower back pain, tinnitus, knee issue, migraine records"
    ></textarea>

    <label class="label" for="serviceContext">Service context</label>
    <textarea
      id="serviceContext"
      placeholder="Example: deployed 2010-2011, airborne ops, MOS, injury event, hearing exposure"
      style="min-height: 90px;"
    ></textarea>

    <input
      id="fileInput"
      class="hidden-file"
      type="file"
      accept="image/*,.jpg,.jpeg,.png,.webp"
    />

    <button id="uploadBtn" class="btn btn-blue" type="button">Upload Image</button>

    <img id="preview" class="preview" alt="Preview" />

    <button onclick="analyze()">Analyze Claim</button>

    <div id="loading" class="loading" style="display:none;">Analyzing...</div>

    <div id="resultMount"></div>

    <button onclick="loadClaims()">View Saved Claims</button>

<div class="claims-wrap">
      <div class="claims-title">Saved VA Claims</div>
      <div id="claimsList" class="muted">Loading...</div>
    </div>
  </div>

  




<script>
async function analyze() {
  const issue = document.getElementById("issue").value || "";
  const serviceContext = document.getElementById("serviceContext").value || "";
  const resultBox = document.getElementById("resultMount");

  resultBox.innerHTML = "Running...";

  try {
    const res = await fetch("/va/analyze-base64", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ issue, serviceContext })
    });

    const text = await res.text();
    console.log("RAW:", text);

    let data = {};
    try { data = JSON.parse(text); } catch {}

    if (!res.ok) {
      throw new Error(data.error || text);
    }

    resultBox.innerHTML = `
      <div><b>Summary:</b> ${data.summary || "none"}</div>
      <div><b>Condition:</b> ${data?.structured?.condition || "N/A"}</div>
      <div><b>Rating:</b> ${data?.structured?.estimatedRating || "N/A"}</div>
      <div><b>Confidence:</b> ${data?.structured?.confidence || "N/A"}</div>
    `;
  } catch (e) {
    resultBox.innerHTML = e.message;
  }
}

async function loadClaims() {
  const box = document.getElementById("claimsList");
  box.innerHTML = "Loading...";

  try {
    const res = await fetch("/claims");
    const text = await res.text();
    console.log("CLAIMS RAW:", text);

    let data = {};
    try { data = JSON.parse(text); } catch {}

    if (!res.ok) {
      throw new Error(data.error || text);
    }

    if (!data.claims || data.claims.length === 0) {
      box.innerHTML = "No saved claims yet.";
      return;
    }

    box.innerHTML = data.claims.map(c => `
      <div style="margin:10px 0;padding:10px;border:1px solid #333">
        <div>${c.detected_condition || "Unknown"}</div>
        <div>Rating: ${c.estimated_rating ?? "N/A"}</div>
      </div>
    `).join("");
  } catch (e) {
    box.innerHTML = e.message;
  }
}

// bind buttons
setTimeout(() => {
  document.querySelector("button").onclick = analyze;
  const btns = document.querySelectorAll("button");
  if (btns[1]) btns[1].onclick = loadClaims;
}, 500);
</script>

</body>
</html>
